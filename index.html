<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOTEPAD LOCK TOGEL MAS ROY</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    color:white;
    background:linear-gradient(135deg,#020617,#0f172a);
    min-height:100vh;
}

.header{
    text-align:center;
    padding:20px;
}

.logo{
    display:inline-block;
    padding:18px 35px;
    background:rgba(15,23,42,.8);
    border:2px solid #3b82f6;
    border-radius:25px;
    font-size:28px;
    font-weight:bold;
}

.add-btn{
    display:block;
    margin:10px auto;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:15px;
    padding:15px;
}

.box{
    background:#050505;
    padding:15px;
    border-radius:15px;
    position:relative;
    white-space:pre-line;
    line-height:1.6;
    outline:none;
}

.copy-btn{
    position:absolute;
    right:10px;
    bottom:10px;
    border:none;
    background:#2563eb;
    color:white;
    padding:6px 12px;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">📝 NOTEPAD TOGEL ROY</div>
</div>

<button class="add-btn" onclick="addBox()">➕ Tambah Box</button>

<div class="container" id="container">

    <div class="box" contenteditable="true">
BERI PERINGATAN BATASAN PASANG TOGEL 2D
JIKA KEDAPATAN BETTING LEBIH BATAS
HANGUSKAN KEMENANGAN
        <button class="copy-btn" onclick="copyBox(this)">COPY</button>
    </div>

    <div class="box" contenteditable="true">
INVEST 2D, BERI PERINGATAN BATASAN
TIDAK TERIMA BETTING TOGEL
        <button class="copy-btn" onclick="copyBox(this)">COPY</button>
    </div>

</div>

<script>
function copyBox(btn){
    const text = btn.parentElement.innerText.replace("COPY","");
    navigator.clipboard.writeText(text);

    alert("✔ Teks dicopy");
}

function addBox(){
    const container = document.getElementById("container");

    const box = document.createElement("div");
    box.className = "box";
    box.contentEditable = true;

    box.innerHTML = `
        Tulis teks di sini...
        <button class="copy-btn" onclick="copyBox(this)">COPY</button>
    `;

    container.appendChild(box);
}
</script>

</body>
</html>
