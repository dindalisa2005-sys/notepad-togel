<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notepad Cyber Lock</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
:root{
    --bg:#0f172a;
    --box:#050505;
    --text:white;
    --btn:#2563eb;
}

.light{
    --bg:#f1f5f9;
    --box:white;
    --text:black;
    --btn:#0ea5e9;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
    transition:0.3s;
}

/* ===== CYBER BACKGROUND ===== */
.grid{
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
    background-size:50px 50px;
    z-index:-3;
}

.cyber-bg{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,255,255,0.15), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,255,128,0.12), transparent 40%),
        linear-gradient(135deg,#020617,#000);
    z-index:-2;
}

.scanline{
    position:fixed;
    top:-40%;
    left:0;
    width:100%;
    height:40%;
    background:linear-gradient(
        to bottom,
        transparent,
        rgba(0,255,255,0.08),
        rgba(0,255,255,0.2),
        transparent
    );
    animation:scanMove 4s linear infinite;
    z-index:-1;
}

@keyframes scanMove{
    0%{top:-40%;}
    100%{top:120%;}
}

/* ===== LOCK ===== */
#lockScreen{
    position:fixed;
    inset:0;
    background:#0f172a;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

#lockScreen input{
    padding:10px;
    border:none;
    border-radius:8px;
    margin:5px;
}

/* ===== HEADER ===== */
.header{
    text-align:center;
    padding:20px;
}

/* ===== BUTTON ===== */
button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:3px;
}

.add-btn{background:#22c55e;color:white;}
.mode-btn{background:#f59e0b;color:white;}

/* ===== CONTAINER ===== */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:10px;
    padding:15px;
}

/* ===== BOX ===== */
.box{
    background:var(--box);
    color:var(--text);
    padding:15px;
    border-radius:12px;
    position:relative;
    min-height:80px;
    outline:none;
    white-space:pre-wrap;
}

/* ===== COPY ===== */
.copy-btn{
    position:absolute;
    right:8px;
    bottom:8px;
    background:var(--btn);
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:6px;
}

/* ===== DRAG ===== */
.drag-handle{
    position:absolute;
    top:8px;
    right:8px;
    cursor:grab;
    opacity:0.5;
}
</style>
</head>

<body>

<!-- CYBER EFFECT -->
<div class="grid"></div>
<div class="cyber-bg"></div>
<div class="scanline"></div>

<!-- LOCK SCREEN -->
<div id="lockScreen">
    <h2>🔐 Masukkan Password</h2>
    <input type="password" id="pass">
    <button onclick="checkPass()">Masuk</button>
    <p id="err" style="color:red;"></p>
</div>

<!-- APP -->
<div class="header">
    <h2>📝 NOTEPAD CYBER LOCK</h2>
    <button class="add-btn" onclick="addBox()">➕ Tambah Box</button>
    <button class="mode-btn" onclick="toggleMode()">🌙 / ☀ Mode</button>
</div>

<div class="container" id="container"></div>

<script>
const PASSWORD = "1234";
let container = document.getElementById("container");

/* ===== LOCK ===== */
function checkPass(){
    let input = document.getElementById("pass").value;

    if(input === PASSWORD){
        document.getElementById("lockScreen").style.display = "none";
    } else {
        document.getElementById("err").innerText = "Password salah!";
    }
}

/* ===== ADD BOX ===== */
function addBox(text="Tulis teks di sini..."){
    let box = document.createElement("div");
    box.className = "box";
    box.contentEditable = true;

    box.innerHTML = `
        <div class="drag-handle">☰</div>
        ${text}
        <button class="copy-btn" onclick="copyBox(this)">COPY</button>
    `;

    container.appendChild(box);
    saveData();
}

/* ===== COPY ===== */
function copyBox(btn){
    let text = btn.parentElement.innerText.replace("COPY","");
    navigator.clipboard.writeText(text);
}

/* ===== SAVE ===== */
function saveData(){
    localStorage.setItem("boxes", container.innerHTML);
}

/* ===== LOAD ===== */
function loadData(){
    let data = localStorage.getItem("boxes");
    if(data){
        container.innerHTML = data;
    } else {
        addBox();
    }
}

/* ===== MODE ===== */
function toggleMode(){
    document.body.classList.toggle("light");
}

/* ===== DRAG ===== */
new Sortable(container, {
    animation:150,
    handle:".drag-handle",
    onEnd: saveData
});

document.addEventListener("input", saveData);

loadData();
</script>

</body>
</html>
