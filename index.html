<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Casino Notepad</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#020617;
    color:white;
    overflow-x:hidden;
}

/* LED BACKGROUND */
.led{
    position:fixed;
    inset:0;
    background:radial-gradient(circle at 20% 20%, rgba(0,255,255,0.15), transparent 40%),
               radial-gradient(circle at 80% 80%, rgba(0,255,128,0.12), transparent 40%);
    animation:blink 2s infinite alternate;
    z-index:-2;
}

@keyframes blink{
    0%{filter:brightness(1);}
    100%{filter:brightness(1.4);}
}

/* HEADER */
.header{
    text-align:center;
    padding:10px;
}

/* BALANCE */
.balance{
    font-size:18px;
    margin:10px;
    color:#22d3ee;
}

/* SLOT */
.slot{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:20px;
}

.reel{
    width:90px;
    height:90px;
    background:#0f172a;
    border:2px solid #22d3ee;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    border-radius:10px;
    box-shadow:0 0 10px #22d3ee;
}

/* BUTTON */
button{
    padding:10px 20px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.spin{background:#22c55e;color:white;}
.add{background:#2563eb;color:white;}

/* NOTEPAD */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
    padding:10px;
}

.box{
    background:#0f172a;
    padding:10px;
    border-radius:10px;
    min-height:60px;
    outline:none;
}
</style>
</head>

<body>

<div class="led"></div>

<div class="header">
    <h2>📝 CYBER CASINO NOTEPAD</h2>
    <div class="balance">💰 Saldo: <span id="saldo">1000</span></div>
</div>

<!-- SLOT -->
<div class="slot">
    <div class="reel" id="r1">🍒</div>
    <div class="reel" id="r2">🍋</div>
    <div class="reel" id="r3">🔔</div>
</div>

<button class="spin" onclick="spin()">🎰 SPIN</button>

<!-- NOTEPAD -->
<div>
    <button class="add" onclick="addBox()">➕ Tambah Note</button>
</div>

<div class="container" id="container"></div>

<script>

let saldo = 1000;

const icons = ["🍒","🍋","🍊","🔔","⭐","7️⃣"];

/* SOUND (ding casino) */
function ding(){
    let ctx = new AudioContext();
    let o = ctx.createOscillator();
    let g = ctx.createGain();

    o.type="sine";
    o.frequency.value=800;

    o.connect(g);
    g.connect(ctx.destination);

    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.3);
}

/* SPIN */
function spin(){
    if(saldo < 50){
        alert("Saldo habis!");
        return;
    }

    saldo -= 50;
    updateSaldo();

    let r1=document.getElementById("r1");
    let r2=document.getElementById("r2");
    let r3=document.getElementById("r3");

    let i1=setInterval(()=>r1.innerText=random(),80);
    let i2=setInterval(()=>r2.innerText=random(),80);
    let i3=setInterval(()=>r3.innerText=random(),80);

    setTimeout(()=>clearInterval(i1),1000);
    setTimeout(()=>clearInterval(i2),1400);
    setTimeout(()=>clearInterval(i3),1800);

    setTimeout(()=>{
        let a=random(),b=random(),c=random();
        r1.innerText=a;
        r2.innerText=b;
        r3.innerText=c;

        ding();

        // JACKPOT SIMULASI
        if(a===b && b===c){
            saldo += 500;
            alert("🎉 JACKPOT!");
            ding();
            ding();
        }

        updateSaldo();

    },2000);
}

function random(){
    return icons[Math.floor(Math.random()*icons.length)];
}

/* SALDO */
function updateSaldo(){
    document.getElementById("saldo").innerText=saldo;
}

/* NOTEPAD */
function addBox(){
    let div=document.createElement("div");
    div.className="box";
    div.contentEditable=true;
    div.innerText="Tulis catatan...";
    document.getElementById("container").appendChild(div);
}

</script>

</body>
</html>
