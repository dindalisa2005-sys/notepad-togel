<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Casino Notepad</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
:root{
    --bg:#020617;
    --box:#0f172a;
    --text:white;
    --btn:#22c55e;
    --accent:#22d3ee;
}

.light{
    --bg:#f1f5f9;
    --box:white;
    --text:black;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

/* CYBER BACKGROUND */
.led{
    position:fixed;
    inset:0;
    background:radial-gradient(circle at 20% 20%, rgba(0,255,255,0.15), transparent 40%),
               radial-gradient(circle at 80% 80%, rgba(0,255,128,0.12), transparent 40%);
    animation:blink 2s infinite alternate;
    z-index:-2;
}

.scanline{
    position:fixed;
    width:100%;
    height:40%;
    top:-40%;
    background:linear-gradient(to bottom,transparent,rgba(0,255,255,0.2),transparent);
    animation:scan 4s linear infinite;
    z-index:-1;
}

@keyframes scan{
    0%{top:-40%;}
    100%{top:120%;}
}

@keyframes blink{
    0%{filter:brightness(1);}
    100%{filter:brightness(1.4);}
}

/* HEADER */
.header{
    text-align:center;
    padding:10px;
}

/* TOP MENU */
.menu{
    text-align:center;
    margin:10px;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:3px;
}

.add{background:var(--btn);color:white;}
.mode{background:#f59e0b;color:white;}
.lock{background:#ef4444;color:white;}

/* NOTEPAD */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
    padding:10px;
}

.box{
    background:var(--box);
    padding:10px;
    border-radius:10px;
    min-height:60px;
    outline:none;
}

/* SLOT */
.slot{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:10px;
}

.reel{
    width:70px;
    height:70px;
    background:#0f172a;
    border:2px solid var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
}

.spin{
    background:#22c55e;
    color:white;
}
</style>
</head>

<body>

<div class="led"></div>
<div class="scanline"></div>

<!-- LOCK -->
<div id="lockScreen" style="
position:fixed;inset:0;background:#020617;
display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;">
    <h2>🔐 LOGIN</h2>
    <input id="user" placeholder="username"><br><br>
    <input id="pass" type="password" placeholder="password"><br><br>
    <button onclick="login()">Masuk</button>
    <p id="err"></p>
</div>

<!-- APP -->
<div class="header">
    <h2>📝 Cyber Casino Notepad</h2>
    <div>💰 Saldo: <span id="saldo">1000</span></div>
</div>

<div class="menu">
    <button class="add" onclick="addBox()">➕ Note</button>
    <button class="mode" onclick="toggleMode()">🌙 Mode</button>
    <button class="lock" onclick="changePass()">🔐 Password</button>
</div>

<!-- SLOT -->
<div class="slot">
    <div class="reel" id="r1">🍒</div>
    <div class="reel" id="r2">🍋</div>
    <div class="reel" id="r3">🔔</div>
</div>

<div style="text-align:center">
    <button class="spin" onclick="spin()">🎰 SPIN</button>
</div>

<div class="container" id="container"></div>

<script>
let saldo = 1000;
let icons=["🍒","🍋","🍊","🔔","⭐","7️⃣"];

/* USERS */
let users = JSON.parse(localStorage.getItem("users")||"{}");
let currentUser="";

/* LOGIN */
function login(){
    let u=document.getElementById("user").value;
    let p=document.getElementById("pass").value;

    if(!users[u]) users[u]={pass:p,notes:"",saldo:1000};

    if(users[u].pass===p){
        currentUser=u;
        saldo=users[u].saldo||1000;
        document.getElementById("lockScreen").style.display="none";
        loadNotes();
        updateSaldo();
    } else {
        document.getElementById("err").innerText="Salah!";
    }
}

/* CHANGE PASS */
function changePass(){
    let p=prompt("Password baru:");
    if(p){
        users[currentUser].pass=p;
        saveUsers();
        alert("Password berubah");
    }
}

/* SAVE USERS */
function saveUsers(){
    users[currentUser].saldo=saldo;
    localStorage.setItem("users",JSON.stringify(users));
}

/* NOTES */
function addBox(text="Tulis..."){
    let d=document.createElement("div");
    d.className="box";
    d.contentEditable=true;
    d.innerText=text;
    d.oninput=saveNotes;
    document.getElementById("container").appendChild(d);
}

function saveNotes(){
    let notes=[...document.querySelectorAll(".box")].map(b=>b.innerText);
    users[currentUser].notes=notes;
    saveUsers();
}

function loadNotes(){
    document.getElementById("container").innerHTML="";
    (users[currentUser].notes||[]).forEach(n=>addBox(n));
}

/* MODE */
function toggleMode(){
    document.body.classList.toggle("light");
}

/* SLOT */
function ding(){
    let ctx=new AudioContext();
    let o=ctx.createOscillator();
    let g=ctx.createGain();
    o.frequency.value=800;
    o.connect(g);g.connect(ctx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
}

function random(){
    return icons[Math.floor(Math.random()*icons.length)];
}

function spin(){
    if(saldo<50){alert("Habis");return;}

    saldo-=50;
    updateSaldo();

    let r1=setInterval(()=>r1.innerText=random(),80);
    let r2=setInterval(()=>r2.innerText=random(),80);
    let r3=setInterval(()=>r3.innerText=random(),80);

    setTimeout(()=>{
        clearInterval(r1);clearInterval(r2);clearInterval(r3);

        let a=random(),b=random(),c=random();
        r1.innerText=a;r2.innerText=b;r3.innerText=c;

        ding();

        if(a===b&&b===c){
            saldo+=500;
            alert("JACKPOT!");
        }

        updateSaldo();
        saveUsers();
    },1500);
}

/* SALDO */
function updateSaldo(){
    document.getElementById("saldo").innerText=saldo;
}
</script>

</body>
</html>
